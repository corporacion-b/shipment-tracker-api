name: CI/CD Shipment Tracker API

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
    tags: [ "v*" ] 
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    # Servicio de base de datos para pruebas
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: shipments
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Pruebas Automatizadas
      env:
        # Apuntar a la base de datos del servicio definido arriba
        DATABASE_URL: mysql://root:secret@127.0.0.1:3306/shipments
      run: |
        pytest

    - name: Login en Docker Hub
      if: success()
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      if: success()
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          erickyamilrc/shipment-tracker-api:latest
          erickyamilrc/shipment-tracker-api:${{ github.sha }}
          ${{ contains(github.ref, 'tags/') && format('erickyamilrc/shipment-tracker-api:{0}', github.ref_name) || '' }}