name: CI/CD Shipment Tracker API

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
    tags: [ "v*" ] 
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: shipments
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13' # Sincronizado con tu versión local

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-anyio # Aseguramos las dependencias de async

    - name: Esperar a que MySQL esté listo
      run: |
        sudo apt-get update && sudo apt-get install -y mysql-client
        until mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
          echo "Esperando a MySQL..."
          sleep 2
        done

    - name: Ejecutar Pruebas Automatizadas
      env:
        DATABASE_URL: mysql://root:secret@127.0.0.1:3306/shipments
        PYTHONPATH: .
        # Para testeo
        DHL_API_KEY: "dummy_key_for_testing" 
        # Para JWT
        JWT_SECRET_KEY: "test_secret_key"
        JWT_ALGORITHM: "HS256"
      run: |
        python -m pytest tests/ -v

    - name: Login en Docker Hub
      if: success() && github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      if: success() && github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          erickyamilrc/shipment-tracker-api:latest
          erickyamilrc/shipment-tracker-api:${{ github.sha }}
          ${{ startsWith(github.ref, 'refs/tags/v') && format('erickyamilrc/shipment-tracker-api:{0}', github.ref_name) || '' }}